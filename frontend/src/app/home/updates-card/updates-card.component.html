<div class="flex gap-5">
  <img class="w-[170px] object-cover" [src]="article?.image?.image" [alt]="article?.image?.alt">

  <div class="pl-5 py-[27px]">
    <div class="flex items-center">
      <span class="font-light text-heading text-body opacity-60 mr-7">{{ article?.datePosted }}</span>
      <span class="w-1 h-1 bg-heading opacity-60 rounded-full mr-2"></span>
      <span class="font-light text-body text-heading opacity-60">{{ article?.user }}</span>
    </div>

    <a [routerLink]="['/blog', article?.category?.slug, article?.slug]" class="font-workSans font-bold text-h6 text-heading mt-2 hover:text-brandPrimary duration-300">{{ article?.title }}</a>
  </div>
</div>
