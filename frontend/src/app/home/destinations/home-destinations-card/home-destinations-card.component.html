<div class="relative col-span-3">
  <img class="w-[270px] h-[200px] object-cover" [src]="destination.imageUrl">
  <div class="absolute left-3 bottom-3">
    <span class="font-light text-bodySmall text-white">{{ destination.travelersCount }} Travelers</span>
    <h3 class="font-kaushan font-normal text-xl text-white mt-1">{{ destination.country }}</h3>
  </div>
</div>
