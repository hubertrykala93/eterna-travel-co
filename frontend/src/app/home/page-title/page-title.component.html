<ng-container *ngIf="isHomePage; else othersPage">
  <div class="flex items-center justify-center relative h-[530px]">
    <div class="absolute inset-0 bg-secondaryPageTitleColor"></div>
    <div class="absolute inset-0 bg-primaryPageTitleColor opacity-70"></div>

    <div class="flex flex-col items-center z-10">
      <div class="flex flex-col items-center gap-2">
        <span class="font-kaushan font-normal text-3xl text-brandPrimary">Save 15% off in Worldwide</span>
        <h1 class="font-workSans text-h1 font-bold text-white">Travel & Adventures</h1>
      </div>

      <span class="font-workSans text-subtitle font-semibold text-white">Find awesome hotel, tour, car and activities in London</span>
    </div>

    <div class="absolute bottom-[-55px]">
      <div class="flex bg-white rounded-xl p-6 border-heading border-[1px] border-opacity-10">
        <form>
          <div class="flex justify-between gap-4">
            <div class="flex flex-col gap-1">
              <label class="font-kaushan font-normal text-sm leading-[16px] text-heading">Destination</label>
              <div class="relative">
                <input class="w-full pl-10 pr-[10px] py-[10px] border border-opacity-10 rounded-md border-heading placeholder:font-inter text-bodySmall font-light text-opacity-40" placeholder="Where to go?">

                  </g>
                  <defs>
                    <clipPath id="clip0_1452_804">
                      <rect width="16" height="16" fill="white"/>
                    </clipPath>
                  </defs>
                </svg>
              </div>
            </div>
            <div class="flex flex-col gap-1">
              <label class="font-kaushan font-normal text-sm leading-[16px] text-heading">Type</label>
              <div class="relative">
                <input class="w-full pl-10 pr-[10px] py-[10px] border border-opacity-10 rounded-md border-heading placeholder:font-inter text-bodySmall font-light text-opacity-40" placeholder="Activity">
                <svg class="absolute w-4 left-2 top-1/2 transform -translate-y-1/2 ml-2" viewBox="0 0 17 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path fill-rule="evenodd" clip-rule="evenodd" d="M2.75 2.5C3.02614 2.5 3.25 2.72386 3.25 3V13.5C3.25 13.7761 3.02614 14 2.75 14C2.47386 14 2.25 13.7761 2.25 13.5V3C2.25 2.72386 2.47386 2.5 2.75 2.5Z" fill="#051036" fill-opacity="0.4"/>

                </svg>
              </div>
            </div>
            <div class="flex flex-col gap-1">
              <label class="font-kaushan font-normal text-sm leading-[16px] text-heading">When</label>
              <div class="relative">
                <input class="w-full pl-10 pr-[10px] py-[10px] border border-opacity-10 rounded-md border-heading placeholder:font-inter text-bodySmall font-light text-opacity-40" placeholder="Date">
                <svg class="absolute w-4 left-2 top-1/2 transform -translate-y-1/2 ml-2" viewBox="0 0 17 16" fill="none" xmlns="http://www.w3.org/2000/svg">

                  <path d="M5.8335 1.33325V3.99992" stroke="#051036" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M2.5 6.66675H14.5" stroke="#051036" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
            <div class="flex flex-col gap-1">
              <label class="font-kaushan font-normal text-sm leading-[16px] text-heading">Guests</label>
              <div class="relative">
                <input class="w-full pl-10 pr-[10px] py-[10px] border border-opacity-10 rounded-md border-heading placeholder:font-inter text-bodySmall font-light text-opacity-40" placeholder="0">
                <svg class="absolute w-4 left-2 top-1/2 transform -translate-y-1/2 ml-2" viewBox="0 0 17 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <g clip-path="url(#clip0_1452_859)">

                    <path d="M11.4165 2.08667C11.9901 2.23354 12.4985 2.56714 12.8616 3.03488C13.2247 3.50262 13.4217 4.07789 13.4217 4.67C13.4217 5.26212 13.2247 5.83739 12.8616 6.30513C12.4985 6.77287 11.9901 7.10647 11.4165 7.25334" stroke="#051036" stroke-opacity="0.4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </g>
                  <defs>
                    <clipPath id="clip0_1452_859">
                      <rect width="16" height="16" fill="white" transform="translate(0.75)"/>
                    </clipPath>
                  </defs>
                </svg>
              </div>
            </div>

            <div class="flex">
              <button class="font-inter text-action font-light text-white bg-brandPrimary px-7 py-3 rounded-md">Search</button>
            </div>

          </div>
        </form>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #othersPage>
<div class="flex items-center justify-center relative h-[280px]">
  <div class="absolute inset-0 bg-secondaryPageTitleColor"></div>
  <div class="absolute inset-0 bg-primaryPageTitleColor opacity-70"></div>

  <div class="flex flex-col items-center relative text-center">
    <h1 class="font-bold text-white text-h1">{{ pageName }}</h1>

    <div class="flex font-workSans font-semibold text-subtitle text-white gap-1">
      <span>
        <a class="hover:text-brandPrimary duration-300" routerLink="/">Home</a>
      </span>
      <span>/</span>
      <span class="text-brandPrimary">{{ pageName }}</span>
    </div>
  </div>
</div>
</ng-template>
