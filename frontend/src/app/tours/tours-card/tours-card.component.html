<div class="bg-surface">
  <img [src]="tour.imageUrl">

  <div class="px-5 py-4">
    <span class="font-light text-bodySmall text-heading opacity-60">{{ tour.city }}, {{ tour.country }}</span>
    <h6 class="font-workSans font-bold text-h6 text-heading mt-2 mb-[9px]">{{ tour.title }}</h6>

    <div class="flex items-center justify-between">
      <div class="flex items-center">
        <div class="relative bg-brandPrimary px-2 py-1 rounded">
          <svg class="absolute left-2 top-1/2 transform -translate-y-1/2 fill-white w-3 h-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512">
            <title>Star icon</title>
            <path d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 150.3 51.4 171.5c-12 1.8-22 10.2-25.7 21.7s-.7 24.2 7.9 32.7L137.8 329 113.2 474.7c-2 12 3 24.2 12.9 31.3s23 8 33.8 2.3l128.3-68.5 128.3 68.5c10.8 5.7 23.9 4.9 33.8-2.3s14.9-19.3 12.9-31.3L438.5 329 542.7 225.9c8.6-8.5 11.7-21.2 7.9-32.7s-13.7-19.9-25.7-21.7L381.2 150.3 316.9 18z"/>
          </svg>
          <span class="font-light text-normal text-white ml-4">{{ tour.rate }}</span>
        </div>

        <span class="font-normal text-bodySmall text-heading opacity-60 ml-2">{{ tour.reviews }} Reviews</span>
      </div>

      <div class="flex items-center">
        <svg class="w-[14px] h-[14px] fill-heading opacity-60" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <title>Clock icon</title>
          <path d="M464 256A208 208 0 1 1 48 256a208 208 0 1 1 416 0zM0 256a256 256 0 1 0 512 0A256 256 0 1 0 0 256zM232 120l0 136c0 8 4 15.5 10.7 20l96 64c11 7.4 25.9 4.4 33.3-6.7s4.4-25.9-6.7-33.3L280 243.2 280 120c0-13.3-10.7-24-24-24s-24 10.7-24 24z"/>
        </svg>
        <span class="font-normal text-bodySmall text-heading opacity-60 pl-1">{{ tour.duration }} days</span>
      </div>
    </div>

    <div class="border-t-[1px] border-heading opacity-10 mt-[10px] mb-[15px]"></div>

    <div class="flex items-center justify-between">
      <span class="font-normal text-caption text-heading opacity-60">Starting From</span>
      <span class="font-kaushan font-normal text-xl leading-[26px] text-heading">${{ tour.startingPrice }}</span>
    </div>
  </div>
</div>
